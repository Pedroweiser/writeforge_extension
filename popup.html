<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WriteForge</title>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      width: 280px;
      padding: 20px;
      background: #0B0F19;
      color: #F9FAFB;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
    }

    .popup-header {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-bottom: 16px;
    }

    .popup-logo {
      width: 32px;
      height: 32px;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      border-radius: 8px;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .popup-logo svg {
      width: 18px;
      height: 18px;
    }

    .popup-title {
      font-size: 16px;
      font-weight: 600;
    }

    .popup-desc {
      color: #9CA3AF;
      font-size: 13px;
      line-height: 1.5;
      margin-bottom: 16px;
    }

    .popup-status {
      display: flex;
      align-items: center;
      gap: 8px;
      padding: 10px 12px;
      background: #111827;
      border-radius: 8px;
      margin-bottom: 16px;
      font-size: 13px;
    }

    .status-dot {
      width: 8px;
      height: 8px;
      border-radius: 50%;
      background: #EF4444;
      flex-shrink: 0;
    }

    .status-dot.connected {
      background: #10B981;
    }

    .btn-open {
      width: 100%;
      padding: 12px;
      background: linear-gradient(135deg, #6366F1, #7C3AED);
      color: white;
      border: none;
      border-radius: 10px;
      font-size: 14px;
      font-weight: 600;
      cursor: pointer;
      transition: all 0.2s ease;
    }

    .btn-open:hover {
      opacity: 0.9;
      transform: translateY(-1px);
    }

    .btn-open:active {
      transform: translateY(0);
    }

    .popup-hint {
      text-align: center;
      color: #6B7280;
      font-size: 11px;
      margin-top: 12px;
    }
  </style>
</head>
<body>
  <div class="popup-header">
    <div class="popup-logo">
      <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 20H21" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
        <path d="M16.5 3.5C16.8978 3.10217 17.4374 2.87868 18 2.87868C18.5626 2.87868 19.1022 3.10217 19.5 3.5C19.8978 3.89782 20.1213 4.43739 20.1213 5C20.1213 5.56261 19.8978 6.10217 19.5 6.5L7 19L3 20L4 16L16.5 3.5Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
      </svg>
    </div>
    <span class="popup-title">WriteForge</span>
  </div>

  <p class="popup-desc">
    Abra o painel lateral no LinkedIn para criar posts profissionais com IA.
  </p>

  <div class="popup-status">
    <span class="status-dot" id="statusDot"></span>
    <span id="statusText">Verificando...</span>
  </div>

  <button class="btn-open" id="btnOpen">Abrir no LinkedIn</button>

  <p class="popup-hint">Funciona apenas em páginas do LinkedIn</p>

  <script>
    const btnOpen = document.getElementById("btnOpen");
    const statusDot = document.getElementById("statusDot");
    const statusText = document.getElementById("statusText");

    // Verificar autenticação
    chrome.runtime.sendMessage({ action: "CHECK_AUTH" }, (response) => {
      if (response && response.authenticated) {
        statusDot.classList.add("connected");
        statusText.textContent = "Conectado como " + (response.user?.name || "Usuário");
      } else {
        statusText.textContent = "Não conectado";
      }
    });

    // Abrir painel no LinkedIn
    btnOpen.addEventListener("click", async () => {
      const [tab] = await chrome.tabs.query({ active: true, currentWindow: true });

      if (tab && tab.url && tab.url.includes("linkedin.com")) {
        // Enviar mensagem para o content script abrir o painel
        chrome.tabs.sendMessage(tab.id, { action: "TOGGLE_PANEL" }, (response) => {
          window.close();
        });
      } else {
        // Abrir LinkedIn se não estiver nele
        chrome.tabs.create({ url: "https://www.linkedin.com/feed/" }, () => {
          window.close();
        });
      }
    });
  </script>
</body>
</html>

<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>WriteForge</title>
  <style>
    /* ─── Reset & Base ────────────────────────────────────────────────── */
    *, *::before, *::after {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --bg-primary: #0B0F19;
      --bg-secondary: #111827;
      --bg-tertiary: #1F2937;
      --bg-hover: #374151;
      --text-primary: #F9FAFB;
      --text-secondary: #9CA3AF;
      --text-muted: #6B7280;
      --accent: #6366F1;
      --accent-hover: #818CF8;
      --accent-glow: rgba(99, 102, 241, 0.3);
      --success: #10B981;
      --error: #EF4444;
      --border: rgba(255, 255, 255, 0.06);
      --border-focus: rgba(99, 102, 241, 0.5);
      --radius-sm: 8px;
      --radius-md: 12px;
      --radius-lg: 16px;
      --shadow-sm: 0 1px 2px rgba(0, 0, 0, 0.2);
      --shadow-md: 0 4px 12px rgba(0, 0, 0, 0.3);
      --transition: 0.2s ease;
    }

    html, body {
      width: 100%;
      height: 100%;
      background: var(--bg-primary);
      color: var(--text-primary);
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, 'Helvetica Neue', Arial, sans-serif;
      font-size: 14px;
      line-height: 1.5;
      overflow-x: hidden;
      -webkit-font-smoothing: antialiased;
    }

    /* ─── Scrollbar ───────────────────────────────────────────────────── */
    ::-webkit-scrollbar {
      width: 6px;
    }
    ::-webkit-scrollbar-track {
      background: transparent;
    }
    ::-webkit-scrollbar-thumb {
      background: var(--bg-tertiary);
      border-radius: 3px;
    }
    ::-webkit-scrollbar-thumb:hover {
      background: var(--bg-hover);
    }

    /* ─── Layout ──────────────────────────────────────────────────────── */
    .app {
      display: flex;
      flex-direction: column;
      height: 100vh;
      overflow: hidden;
    }

    /* ─── Header ──────────────────────────────────────────────────────── */
    .header {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 16px 20px;
      border-bottom: 1px solid var(--border);
      background: var(--bg-primary);
      flex-shrink: 0;
    }

    .header-left {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .logo {
      width: 28px;
      height: 28px;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
    }

    .logo svg {
      width: 16px;
      height: 16px;
    }

    .header-title {
      font-size: 16px;
      font-weight: 600;
      letter-spacing: -0.01em;
    }

    .btn-close {
      width: 32px;
      height: 32px;
      border: none;
      background: transparent;
      color: var(--text-secondary);
      cursor: pointer;
      border-radius: var(--radius-sm);
      display: flex;
      align-items: center;
      justify-content: center;
      transition: all var(--transition);
    }

    .btn-close:hover {
      background: var(--bg-tertiary);
      color: var(--text-primary);
    }

    /* ─── Content Area ────────────────────────────────────────────────── */
    .content {
      flex: 1;
      overflow-y: auto;
      padding: 20px;
    }

    /* ─── Screens ─────────────────────────────────────────────────────── */
    .screen {
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .screen.active {
      display: block;
    }

    @keyframes fadeIn {
      from { opacity: 0; transform: translateY(8px); }
      to { opacity: 1; transform: translateY(0); }
    }

    /* ─── Login Screen ────────────────────────────────────────────────── */
    .login-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      text-align: center;
      padding: 40px 20px;
    }

    .login-icon {
      width: 72px;
      height: 72px;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      border-radius: 20px;
      display: flex;
      align-items: center;
      justify-content: center;
      margin-bottom: 24px;
      box-shadow: 0 8px 32px rgba(99, 102, 241, 0.3);
    }

    .login-icon svg {
      width: 36px;
      height: 36px;
    }

    .login-title {
      font-size: 22px;
      font-weight: 700;
      margin-bottom: 8px;
      letter-spacing: -0.02em;
    }

    .login-subtitle {
      color: var(--text-secondary);
      margin-bottom: 32px;
      font-size: 14px;
      max-width: 280px;
      line-height: 1.6;
    }

    .btn-login {
      width: 100%;
      max-width: 280px;
      padding: 14px 24px;
      background: linear-gradient(135deg, #6366F1, #7C3AED);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
      letter-spacing: -0.01em;
    }

    .btn-login:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4);
    }

    .btn-login:active {
      transform: translateY(0);
    }

    .btn-login:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .login-error {
      color: var(--error);
      font-size: 13px;
      margin-top: 16px;
      display: none;
    }

    .login-error.visible {
      display: block;
    }

    /* ─── Main Screen (Create Post) ───────────────────────────────────── */
    .user-bar {
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 12px 16px;
      background: var(--bg-secondary);
      border-radius: var(--radius-md);
      margin-bottom: 24px;
    }

    .user-info {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .user-avatar {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #6366F1, #8B5CF6);
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 14px;
      font-weight: 600;
      color: white;
      flex-shrink: 0;
    }

    .user-name {
      font-size: 14px;
      font-weight: 500;
    }

    .user-email {
      font-size: 12px;
      color: var(--text-muted);
    }

    .btn-logout {
      padding: 6px 12px;
      background: transparent;
      border: 1px solid var(--border);
      color: var(--text-secondary);
      border-radius: var(--radius-sm);
      font-size: 12px;
      cursor: pointer;
      transition: all var(--transition);
    }

    .btn-logout:hover {
      border-color: var(--error);
      color: var(--error);
      background: rgba(239, 68, 68, 0.1);
    }

    /* ─── Section Title ───────────────────────────────────────────────── */
    .section-title {
      font-size: 13px;
      font-weight: 600;
      text-transform: uppercase;
      letter-spacing: 0.05em;
      color: var(--text-muted);
      margin-bottom: 12px;
    }

    /* ─── Textarea ────────────────────────────────────────────────────── */
    .textarea-wrapper {
      position: relative;
      margin-bottom: 16px;
    }

    .post-textarea {
      width: 100%;
      min-height: 160px;
      padding: 16px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      color: var(--text-primary);
      font-size: 14px;
      font-family: inherit;
      line-height: 1.6;
      resize: vertical;
      transition: border-color var(--transition);
      outline: none;
    }

    .post-textarea::placeholder {
      color: var(--text-muted);
    }

    .post-textarea:focus {
      border-color: var(--border-focus);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .char-count {
      position: absolute;
      bottom: 12px;
      right: 12px;
      font-size: 11px;
      color: var(--text-muted);
    }

    /* ─── Generate Button ─────────────────────────────────────────────── */
    .btn-generate {
      width: 100%;
      padding: 14px;
      background: linear-gradient(135deg, #6366F1, #7C3AED);
      color: white;
      border: none;
      border-radius: var(--radius-md);
      font-size: 15px;
      font-weight: 600;
      cursor: pointer;
      transition: all var(--transition);
      box-shadow: 0 4px 16px rgba(99, 102, 241, 0.3);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-generate:hover {
      transform: translateY(-1px);
      box-shadow: 0 6px 24px rgba(99, 102, 241, 0.4);
    }

    .btn-generate:active {
      transform: translateY(0);
    }

    .btn-generate:disabled {
      opacity: 0.6;
      cursor: not-allowed;
      transform: none;
    }

    .btn-generate .spinner {
      display: none;
      width: 18px;
      height: 18px;
      border: 2px solid rgba(255, 255, 255, 0.3);
      border-top-color: white;
      border-radius: 50%;
      animation: spin 0.6s linear infinite;
    }

    .btn-generate.loading .spinner {
      display: block;
    }

    .btn-generate.loading .btn-text {
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    /* ─── Result Area ─────────────────────────────────────────────────── */
    .result-area {
      margin-top: 24px;
      display: none;
      animation: fadeIn 0.3s ease;
    }

    .result-area.visible {
      display: block;
    }

    .result-card {
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      padding: 16px;
      margin-bottom: 16px;
    }

    .result-label {
      font-size: 12px;
      font-weight: 600;
      color: var(--accent);
      text-transform: uppercase;
      letter-spacing: 0.05em;
      margin-bottom: 12px;
    }

    .result-text {
      font-size: 14px;
      line-height: 1.7;
      white-space: pre-wrap;
      word-break: break-word;
      color: var(--text-primary);
    }

    /* ─── Suggestions ─────────────────────────────────────────────────── */
    .suggestions {
      margin-top: 16px;
    }

    .suggestion-item {
      display: flex;
      align-items: flex-start;
      gap: 8px;
      padding: 10px 12px;
      background: var(--bg-secondary);
      border: 1px solid var(--border);
      border-radius: var(--radius-sm);
      margin-bottom: 8px;
      font-size: 13px;
      color: var(--text-secondary);
      line-height: 1.5;
    }

    .suggestion-icon {
      color: var(--accent);
      flex-shrink: 0;
      margin-top: 1px;
    }

    /* ─── Copy Button ─────────────────────────────────────────────────── */
    .btn-copy {
      width: 100%;
      padding: 12px;
      background: var(--bg-tertiary);
      color: var(--text-primary);
      border: 1px solid var(--border);
      border-radius: var(--radius-md);
      font-size: 14px;
      font-weight: 500;
      cursor: pointer;
      transition: all var(--transition);
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 8px;
    }

    .btn-copy:hover {
      background: var(--bg-hover);
      border-color: rgba(255, 255, 255, 0.12);
    }

    .btn-copy.copied {
      border-color: var(--success);
      color: var(--success);
    }

    /* ─── Loading Screen ──────────────────────────────────────────────── */
    .loading-screen {
      display: flex;
      flex-direction: column;
      align-items: center;
      justify-content: center;
      min-height: 100%;
      gap: 16px;
    }

    .loading-spinner {
      width: 36px;
      height: 36px;
      border: 3px solid var(--bg-tertiary);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.8s linear infinite;
    }

    .loading-text {
      color: var(--text-secondary);
      font-size: 14px;
    }
  </style>
</head>
<body>
  <div class="app">
    <!-- Header -->
    <div class="header">
      <div class="header-left">
        <div class="logo">
          <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
            <path d="M12 20H21" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            <path d="M16.5 3.5C16.8978 3.10217 17.4374 2.87868 18 2.87868C18.5626 2.87868 19.1022 3.10217 19.5 3.5C19.8978 3.89782 20.1213 4.43739 20.1213 5C20.1213 5.56261 19.8978 6.10217 19.5 6.5L7 19L3 20L4 16L16.5 3.5Z" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
          </svg>
        </div>
        <span class="header-title">WriteForge</span>
      </div>
      <button class="btn-close" id="btnClose" title="Fechar painel">
        <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
          <line x1="18" y1="6" x2="6" y2="18"></line>
          <line x1="6" y1="6" x2="18" y2="18"></line>
        </svg>
      </button>
    </div>

    <!-- Content -->
    <div class="content">
      <!-- Loading Screen -->
      <div class="screen" id="screenLoading">
        <div class="loading-screen">
          <div class="loading-spinner"></div>
          <p class="loading-text">Verificando autenticação...</p>
        </div>
      </div>

      <!-- Login Screen (API Key) -->
      <div class="screen" id="screenLogin">
        <div class="login-screen">
          <div class="login-icon">
            <svg viewBox="0 0 24 24" fill="none" xmlns="http://www.w3.org/2000/svg">
              <path d="M21 2l-2 2m-7.61 7.61a5.5 5.5 0 1 1-7.778 7.778 5.5 5.5 0 0 1 7.777-7.777zm0 0L15.5 7.5m0 0l3 3L22 7l-3-3m-3.5 3.5L19 4" stroke="white" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"/>
            </svg>
          </div>
          <h1 class="login-title">WriteForge</h1>
          <p class="login-subtitle">Cole sua API Key do WriteForge para começar.</p>
          <input
            type="password"
            id="apiKeyInput"
            placeholder="Cole sua API Key aqui..."
            autocomplete="off"
            spellcheck="false"
            style="
              width: 100%;
              max-width: 280px;
              padding: 12px 16px;
              margin-bottom: 12px;
              background: var(--bg-secondary);
              border: 1px solid var(--border);
              border-radius: var(--radius-md);
              color: var(--text-primary);
              font-size: 14px;
              font-family: inherit;
              outline: none;
              transition: border-color var(--transition);
            "
          />
          <button class="btn-login" id="btnLogin">Salvar API Key</button>
          <p class="login-error" id="loginError"></p>
        </div>
      </div>

      <!-- Main Screen -->
      <div class="screen" id="screenMain">
        <!-- User Bar -->
        <div class="user-bar">
          <div class="user-info">
            <div class="user-avatar" id="userAvatar">P</div>
            <div>
              <div class="user-name" id="userName">Usuário</div>
              <div class="user-email" id="userEmail">email@example.com</div>
            </div>
          </div>
          <button class="btn-logout" id="btnLogout">Sair</button>
        </div>

        <!-- Create Post -->
        <p class="section-title">Criar Post</p>
        <select id="postTypeSelect" style="
          width: 100%;
          padding: 10px 12px;
          margin-bottom: 12px;
          background: var(--bg-secondary);
          border: 1px solid var(--border);
          border-radius: var(--radius-md);
          color: var(--text-primary);
          font-size: 14px;
          font-family: inherit;
          outline: none;
          cursor: pointer;
          transition: border-color var(--transition);
          -webkit-appearance: none;
          appearance: none;
          background-image: url('data:image/svg+xml;utf8,<svg xmlns=%22http://www.w3.org/2000/svg%22 width=%2212%22 height=%2212%22 viewBox=%220 0 24 24%22 fill=%22none%22 stroke=%22%239CA3AF%22 stroke-width=%222%22><polyline points=%226 9 12 15 18 9%22/></svg>');
          background-repeat: no-repeat;
          background-position: right 12px center;
        ">
          <option value="">Carregando tipos...</option>
        </select>
        <div class="textarea-wrapper">
          <textarea
            class="post-textarea"
            id="postTextarea"
            placeholder="Escreva sua ideia ou rascunho aqui..."
            maxlength="3000"
          ></textarea>
          <span class="char-count" id="charCount">0 / 3000</span>
        </div>

        <button class="btn-generate" id="btnGenerate">
          <span class="btn-text">Gerar Post</span>
          <div class="spinner"></div>
        </button>

        <!-- Result -->
        <div class="result-area" id="resultArea">
          <p class="section-title">Resultado</p>
          <div class="result-card">
            <p class="result-label">Post Gerado</p>
            <div class="result-text" id="resultText"></div>
          </div>

          <div class="suggestions" id="suggestions"></div>

          <button class="btn-copy" id="btnCopy">
            <svg width="16" height="16" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
              <rect x="9" y="9" width="13" height="13" rx="2" ry="2"></rect>
              <path d="M5 15H4a2 2 0 0 1-2-2V4a2 2 0 0 1 2-2h9a2 2 0 0 1 2 2v1"></path>
            </svg>
            Copiar post
          </button>
        </div>
      </div>
    </div>
  </div>

  <script src="authService.js"></script>
  <script src="panel.js"></script>
</body>
</html>
